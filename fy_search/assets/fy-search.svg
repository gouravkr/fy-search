<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"></stop>
      <stop offset="100%" stop-color="#020617"></stop>
    </linearGradient>

    <!-- Lens gradient -->
    <linearGradient id="lensGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"></stop>
      <stop offset="100%" stop-color="#6366f1"></stop>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGradient)"></rect>

  <!-- Magnifying glass -->
  <circle cx="190" cy="230" r="80" fill="none" stroke="url(#lensGradient)" stroke-width="18"></circle>
  
  <!-- Handle -->
  <line x1="245" y1="285" x2="300" y2="340" stroke="url(#lensGradient)" stroke-width="18" stroke-linecap="round"></line>

  <!-- Highlight -->
  <path d="M155 200 Q170 170 200 185" stroke="#7dd3fc" stroke-width="10" fill="none" stroke-linecap="round"></path>

  <!-- Fy text -->
  <text x="280" y="270" font-family="Inter, Arial, sans-serif" font-size="120" font-weight="600" fill="#e5e7eb">
    Fy
  </text>
</svg>