<svg
  xmlns="http://www.w3.org/2000/svg"
  width="256px"
  height="256px"
  viewBox="0 0 256 256"
>

<rect x="8" y="8" width="240" height="240" rx="64" fill="#222831" />

<defs>
  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>

    <feOffset in="blur" dx="6" dy="6" result="offsetBlur" />

    <feComponentTransfer in="offsetBlur" result="opacityShadow">
      <feFuncA type="linear" slope="0.7"/>
    </feComponentTransfer>

    <feMerge>
      <feMergeNode in="opacityShadow" />
      <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>
</defs>

<g filter="url(#whiteShadow)">
<circle
  cx="120"
  cy="-150"
  r="40"
  fill="none"
  stroke="#a8d461"
  stroke-width="16"
  stroke-dasharray="122.2 60"
  transform="rotate(85 0 0)"
  stroke-linecap="round"
/>
<line x1="132" y1="140" x2="85" y2="200" stroke="#a8d461" stroke-width="20" stroke-linecap="round" />
<text
  x="50"
  y="170"
  font-size="160"
  font-family="verdana"
  fill="#a8d461"
  stroke-linecap="round"
>
  f
</text>
</g>
</svg>
